name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      preview_channel:
        description: 'Preview channel name (leave empty for live deploy)'
        required: false
        type: string

jobs:
  deploy:
    name: "Deploy${{ inputs.preview_channel && format(' (preview: {0})', inputs.preview_channel) || ' (live)' }}"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to live
        if: inputs.preview_channel == ''
        run: firebase deploy --only hosting:datkanikzelf --project datkanikzelf

      - name: Deploy to preview channel
        if: inputs.preview_channel != ''
        run: firebase hosting:channel:deploy ${{ inputs.preview_channel }} --only datkanikzelf --project datkanikzelf --expires 7d
